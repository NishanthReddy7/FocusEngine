name: Deploy web to GitHub Pages

# Builds the default (non-mobile) static export of apps/web and deploys it to
# GitHub Pages at https://nishanthreddy7.github.io/FocusEngine/. See
# docs/V2_ADDENDUM.md A4. The Android-flavored build (NEXT_PUBLIC_PLATFORM=mobile)
# is built separately by android-apk.yml and is never deployed here.

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fails fast with a clear message if Pages isn't enabled with
      # build_type "workflow" yet (see V2-E, which owns turning this on via
      # `gh api`) rather than failing later, confusingly, at upload/deploy.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      # NEXT_OUTPUT/NEXT_PUBLIC_BASE_PATH gate the static export (apps/web's
      # next.config.mjs, owned by the web workstream). NEXT_PUBLIC_API_BASE_URL
      # and NEXT_PUBLIC_GOOGLE_CLIENT_ID are repo VARIABLES, not secrets — both
      # are public client-side values per docs/V2_ADDENDUM.md A4/A8. Either may
      # be unset until the user completes their A8 checklist; the web app is
      # contracted to degrade gracefully (sign-in hidden, "local-only" notice)
      # when NEXT_PUBLIC_GOOGLE_CLIENT_ID is absent.
      - name: Build web (static export)
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_BASE_PATH: /FocusEngine
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: npm run build --workspace=apps/web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
