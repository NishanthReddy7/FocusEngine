# FocusEngine deployment blueprint — V2_ADDENDUM A4.
# A Dockerized FastAPI web service backed by a free Render Postgres instance.
# FE_JWT_SECRET is generated by Render; FE_GOOGLE_CLIENT_ID is the public
# OAuth client id (client ids are not secrets — they ship in the JS bundle);
# FE_CORS_ORIGINS is the Pages origin; FE_DATABASE_URL is wired from the
# managed database.
services:
  - type: web
    name: focusengine-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: free
    envVars:
      - key: FE_DATABASE_URL
        fromDatabase:
          name: focusengine-db
          property: connectionString
      - key: FE_JWT_SECRET
        generateValue: true
      - key: FE_GOOGLE_CLIENT_ID
        value: 968390576201-prm8ajg9gq5rlur12hjr6ujjpm41jd6b.apps.googleusercontent.com
      # Pages site + Capacitor Android WebView origin + local dev.
      - key: FE_CORS_ORIGINS
        value: https://nishanthreddy7.github.io,https://localhost,http://localhost:3000

databases:
  - name: focusengine-db
    plan: free
